{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Online Quiz System{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <!-- 🔥 Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand" href="{% url 'quiz_list' %}">
                QuizMaster
            </a>

            <!-- Right side -->
            <div class="d-flex align-items-center">

                {% if user.is_authenticated %}
                    <span class="text-white me-3">
                        👋 {{ user.username }}
                    </span>

                    <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                        Logout
                    </a>

                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-light btn-sm me-2">
                        Login
                    </a>

                    <a href="{% url 'register' %}" class="btn btn-warning btn-sm">
                        Register
                    </a>
                {% endif %}

            </div>

        </div>
    </nav>

    <!-- 🔹 Main Content -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}

</body>
</html>
